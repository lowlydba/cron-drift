name: Cron Job

on:
  schedule:
    # Runs every hour (at minute 0)
    - cron: '0 * * * *'

jobs:
  run:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: Echo message
        shell: bash
        run: echo "🚫👑 no kings"
